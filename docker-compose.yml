services:
  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecb
      POSTGRES_PASSWORD: ecb
      POSTGRES_DB: ecb_data
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ecb -d ecb_data' ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  cron:
    image: alpine:latest
    container_name: cron
    command: >
      sh -c "apk add --no-cache curl &&
             echo '0 0 1 * * curl -s -X POST http://backend:8000/api/v1/borrowing-rates/ingest' > /etc/crontabs/root &&
             crond -f -l 2"
    depends_on:
      - backend

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - '3001:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:


