services:
  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: parent_match
      POSTGRES_PASSWORD: parent_match
      POSTGRES_DB: parent_match_data
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U parent_match -d parent_match_data' ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy



  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - '3001:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:


